    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a1929;
            color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100vw;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        /* 科技风卡片样式 */
        .box {
            border: 1px solid #1e3a5f;
            background: rgba(10, 25, 41, 0.8);
            margin-bottom: 20px;
            position: relative;
            border-radius: 4px;
        }
        .box::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 12px;
            height: 12px;
            border-top: 2px solid #00f0ff;
            border-left: 2px solid #00f0ff;
            z-index: 2;
        }
        .box::after {
            content: "";
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            border-bottom: 2px solid #00f0ff;
            border-right: 2px solid #00f0ff;
            z-index: 2;
        }
        .box-title {
            height: 40px;
            line-height: 40px;
            padding-left: 20px;
            font-size: 16px;
            color: #00f0ff;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .chart-wrap {
            width: 100%;
            height: calc(100% - 40px);
        }
        /* 顶部标题栏 */
        .header {
            width: 100%;
            height: 70px;
            line-height: 70px;
            text-align: center;
            font-size: 26px;
            color: #00f0ff;
            text-shadow: 0 0 12px rgba(0, 240, 255, 0.5);
            margin-bottom: 10px;
        }
        /* 布局划分 */
        .left-box {
            width: 24%;
            height: calc(100% - 90px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        /* 中间容器：垂直排列 地图+面积图 */
        .center-box {
            width: 50%;
            height: calc(100% - 90px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .right-box {
            width: 24%;
            height: calc(100% - 90px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        /* 左右两侧卡片统一尺寸 */
        .small-card {
            width: 100%;
            height: 48%;
        }
        /* 中间上方地图占比 */
        .map-card {
            width: 100%;
            height: 65%;
        }
        /* 中间下方折线面积图占比 */
        .area-card {
            width: 100%;
            height: 32%;
        }
    </style>
